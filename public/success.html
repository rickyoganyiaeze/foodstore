<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful - FoodStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header" id="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo"><div class="logo-icon">🍕</div><div class="logo-text">Food<span>Store</span></div></a>
            </div>
        </div>
    </header>

    <main class="success-page">
        <div class="container">
            <div class="success-content">
                <div class="success-icon">✓</div>
                <h1 class="success-title">Order Successful!</h1>
                <p class="success-message">Thank you for your purchase. Your order has been confirmed and will be delivered soon.</p>
                
                <div class="order-info" id="orderInfo">
                    <div class="order-info-row">
                        <span>Order Number:</span>
                        <strong id="orderNumber">Loading...</strong>
                    </div>
                    <div class="order-info-row">
                        <span>Payment Reference:</span>
                        <strong id="paymentRef">-</strong>
                    </div>
                </div>

                <a href="index.html" class="btn btn-primary btn-lg">Continue Shopping</a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref');
            const orderId = params.get('orderId');

            if (ref) document.getElementById('paymentRef').textContent = ref;
            if (orderId) {
                try {
                    const res = await FoodStore.apiRequest(`/orders/${orderId}`);
                    document.getElementById('orderNumber').textContent = res.data.orderNumber;
                } catch (e) {
                    document.getElementById('orderNumber').textContent = 'N/A';
                }
            }
        });
    </script>
</body>
</html>
