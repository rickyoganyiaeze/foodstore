<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - FoodStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo"><div class="logo-icon">🍕</div><div class="logo-text">Food<span>Store</span></div></a>
                <nav class="nav" id="nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="products.html" class="nav-link">Products</a>
                </nav>
                <div class="header-actions">
                    <a href="cart.html" class="cart-btn">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="cart-page">
        <div class="container">
            <h1 class="section-title" style="margin-bottom: 30px;">Shopping <span>Cart</span></h1>
            
            <div class="cart-container">
                <div id="cartItemsContainer">
                    <!-- Items will be rendered here -->
                </div>
                
                <div id="cartSummaryContainer">
                    <!-- Summary will be rendered here -->
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderCart);

        function renderCart() {
            const itemsContainer = document.getElementById('cartItemsContainer');
            const summaryContainer = document.getElementById('cartSummaryContainer');
            const cart = FoodStore.getCart();

            if (cart.length === 0) {
                itemsContainer.innerHTML = `
                    <div class="cart-items">
                        <div class="empty-cart">
                            <div class="empty-cart-icon">🛒</div>
                            <h2>Your cart is empty</h2>
                            <p>Looks like you haven't added any items yet.</p>
                            <a href="products.html" class="btn btn-primary">Start Shopping</a>
                        </div>
                    </div>
                `;
                summaryContainer.innerHTML = '';
                return;
            }

            // Render Items
            itemsContainer.innerHTML = `
                <div class="cart-items">
                    <div class="cart-header">
                        <h2>${cart.length} Item(s)</h2>
                        <button class="btn btn-secondary btn-sm" onclick="clearCart()">Clear Cart</button>
                    </div>
                    ${cart.map(item => `
                        <div class="cart-item" data-id="${item._id}">
                            <div class="cart-item-image">
                                <img src="${item.image || 'https://via.placeholder.com/100'}" alt="${item.name}">
                            </div>
                            <div class="cart-item-details">
                                <h3>${item.name}</h3>
                                <div class="category">${item.category || 'Food'}</div>
                                <div class="cart-item-price">${FoodStore.formatCurrency(item.price)}</div>
                            </div>
                            <div class="cart-item-actions">
                                <div class="quantity-control">
                                    <button class="qty-btn" onclick="updateItem('${item._id}', ${item.quantity - 1})">-</button>
                                    <span class="qty-value">${item.quantity}</span>
                                    <button class="qty-btn" onclick="updateItem('${item._id}', ${item.quantity + 1})">+</button>
                                </div>
                                <button class="remove-btn" onclick="removeItem('${item._id}')">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Render Summary
            const subtotal = FoodStore.getCartTotal();
            const delivery = subtotal > 10000 ? 0 : 500;
            const total = subtotal + delivery;

            summaryContainer.innerHTML = `
                <div class="cart-summary">
                    <h3 class="summary-title">Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>${FoodStore.formatCurrency(subtotal)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span>${delivery === 0 ? 'FREE' : FoodStore.formatCurrency(delivery)}</span>
                    </div>
                    ${delivery === 0 ? '<div style="color: var(--success); font-size: 0.85rem; margin-bottom: 16px;">You qualify for free delivery!</div>' : ''}
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>${FoodStore.formatCurrency(total)}</span>
                    </div>
                    <a href="checkout.html" class="btn btn-primary checkout-btn">Proceed to Checkout</a>
                    <a href="products.html" class="btn btn-secondary" style="width: 100%; margin-top: 12px;">Continue Shopping</a>
                </div>
            `;
        }

        function updateItem(id, qty) {
            FoodStore.updateCartQuantity(id, qty);
            renderCart();
        }

        function removeItem(id) {
            FoodStore.removeFromCart(id);
            FoodStore.showToast('Item removed from cart', 'warning');
            renderCart();
        }

        function clearCart() {
            FoodStore.clearCart();
            renderCart();
        }
    </script>
</body>
</html>
