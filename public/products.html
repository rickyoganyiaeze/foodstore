<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - FoodStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header (Same as index.html) -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <div class="logo-icon">🍕</div>
                    <div class="logo-text">Food<span>Store</span></div>
                </a>
                <nav class="nav" id="nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="products.html" class="nav-link active">Products</a>
                    <a href="products.html?category=snacks" class="nav-link">Snacks</a>
                    <a href="products.html?category=drinks" class="nav-link">Drinks</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
                <div class="search-container">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" class="search-input" placeholder="Search products..." id="searchInput">
                </div>
                <div class="header-actions">
                    <a href="cart.html" class="cart-btn">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
                </div>
            </div>
        </div>
    </header>

    <main class="products-page" style="padding: calc(var(--header-height) + 40px) 0 60px;">
        <div class="container">
            <div class="section-header">
                <h1 class="section-title" id="pageTitle">All <span>Products</span></h1>
                <div class="products-sort">
                    <select id="sortSelect" class="search-input" style="width: auto; padding-left: 12px;">
                        <option value="createdAt:desc">Newest First</option>
                        <option value="price:asc">Price: Low to High</option>
                        <option value="price:desc">Price: High to Low</option>
                        <option value="rating:desc">Best Rating</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 250px 1fr; gap: 30px;" class="products-layout">
                <!-- Filters Sidebar -->
                <aside class="filters-sidebar" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; height: fit-content; position: sticky; top: 100px;">
                    <h3 style="font-family: var(--font-display); margin-bottom: 20px;">Filters</h3>
                    
                    <div class="filter-group" style="margin-bottom: 24px;">
                        <h4 style="font-size: 0.9rem; margin-bottom: 12px; color: var(--text-secondary);">Categories</h4>
                        <div id="categoryFilters" style="display: flex; flex-direction: column; gap: 8px;">
                            <label class="filter-checkbox">
                                <input type="radio" name="category" value="" checked> All Categories
                            </label>
                            <label class="filter-checkbox"><input type="radio" name="category" value="snacks"> Snacks</label>
                            <label class="filter-checkbox"><input type="radio" name="category" value="drinks"> Drinks</label>
                            <label class="filter-checkbox"><input type="radio" name="category" value="groceries"> Groceries</label>
                            <label class="filter-checkbox"><input type="radio" name="category" value="fast-food"> Fast Food</label>
                            <label class="filter-checkbox"><input type="radio" name="category" value="fruits"> Fruits</label>
                            <label class="filter-checkbox"><input type="radio" name="category" value="dairy"> Dairy</label>
                        </div>
                    </div>

                    <div class="filter-group" style="margin-bottom: 24px;">
                        <h4 style="font-size: 0.9rem; margin-bottom: 12px; color: var(--text-secondary);">Price Range</h4>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="minPrice" placeholder="Min" class="search-input" style="width: 100%; padding: 10px;">
                            <input type="number" id="maxPrice" placeholder="Max" class="search-input" style="width: 100%; padding: 10px;">
                        </div>
                        <button class="btn btn-secondary btn-sm" style="width: 100%; margin-top: 12px;" onclick="applyFilters()">Apply</button>
                    </div>

                    <button class="btn btn-primary btn-sm" style="width: 100%;" onclick="clearFilters()">Clear Filters</button>
                </aside>

                <!-- Products Grid -->
                <div>
                    <div class="products-grid" id="productsGrid">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                    
                    <!-- Pagination -->
                    <div id="pagination" style="display: flex; justify-content: center; gap: 10px; margin-top: 40px;"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                <p>&copy; 2026 FoodStore. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/main.js"></script>
    <script>
        let currentPage = 1;
        const limit = 12;

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            initFilters();
        });

        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            const params = new URLSearchParams(window.location.search);
            
            // Build query
            const page = params.get('page') || 1;
            const sortBy = document.getElementById('sortSelect').value;
            
            let query = `?limit=${limit}&page=${page}&sortBy=${sortBy}`;
            
            if (params.get('category')) query += `&category=${params.get('category')}`;
            if (params.get('search')) query += `&search=${params.get('search')}`;
            if (params.get('minPrice')) query += `&minPrice=${params.get('minPrice')}`;
            if (params.get('maxPrice')) query += `&maxPrice=${params.get('maxPrice')}`;
            
            try {
                const data = await FoodStore.apiRequest(`/products${query}`);
                if (data.data && data.data.length > 0) {
                    grid.innerHTML = data.data.map(FoodStore.createProductCard).join('');
                    renderPagination(data.pagination);
                } else {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">No products found.</p>';
                }
            } catch (error) {
                // Fallback to sample data
                const samples = generateSampleProducts(12);
                grid.innerHTML = samples.map(FoodStore.createProductCard).join('');
            }
        }

        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            if (!pagination || pagination.totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= pagination.totalPages; i++) {
                html += `<button class="btn ${i === pagination.page ? 'btn-primary' : 'btn-secondary'} btn-sm" onclick="goToPage(${i})">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(page) {
            const params = new URLSearchParams(window.location.search);
            params.set('page', page);
            window.location.search = params.toString();
        }

        function initFilters() {
            const params = new URLSearchParams(window.location.search);
            
            // Set category
            if (params.get('category')) {
                const radio = document.querySelector(`input[name="category"][value="${params.get('category')}"]`);
                if (radio) radio.checked = true;
            }
            
            // Set price
            if (params.get('minPrice')) document.getElementById('minPrice').value = params.get('minPrice');
            if (params.get('maxPrice')) document.getElementById('maxPrice').value = params.get('maxPrice');

            // Handle category change
            document.querySelectorAll('input[name="category"]').forEach(input => {
                input.addEventListener('change', applyFilters);
            });

            // Handle sort change
            document.getElementById('sortSelect').addEventListener('change', loadProducts);
        }

        function applyFilters() {
            const params = new URLSearchParams();
            
            const category = document.querySelector('input[name="category"]:checked').value;
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;
            
            if (category) params.set('category', category);
            if (minPrice) params.set('minPrice', minPrice);
            if (maxPrice) params.set('maxPrice', maxPrice);
            
            window.location.search = params.toString();
        }

        function clearFilters() {
            window.location.href = 'products.html';
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) window.location.href = `products.html?search=${encodeURIComponent(query)}`;
            }
        });

        // Helper to generate samples if API fails
        function generateSampleProducts(count) {
            const items = [
                { name: 'Jollof Rice Bowl', category: 'fast-food', price: 1800, image: 'https://images.unsplash.com/photo-1604329760661-e71dc83f8f26?w=400' },
                { name: 'Chapman Drink', category: 'drinks', price: 1500, image: 'https://images.unsplash.com/photo-1534353473418-4cfa6c56fd38?w=400' },
                { name: 'Meat Pie', category: 'snacks', price: 800, image: 'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400' },
                { name: 'Fresh Salad', category: 'groceries', price: 2200, image: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400' },
                { name: 'Fried Plantain', category: 'fast-food', price: 1000, image: 'https://images.unsplash.com/photo-1600335895229-6e75511892c8?w=400' },
            ];
            return Array(count).fill(null).map((_, i) => ({
                _id: `sample-${i}`,
                ...items[i % items.length],
                rating: 4 + Math.random(),
                stock: 10 + Math.floor(Math.random() * 50)
            }));
        }
    </script>
    <style>
        .filter-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
        .filter-checkbox input { accent-color: var(--accent-primary); }
        @media (max-width: 900px) {
            .products-layout { grid-template-columns: 1fr !important; }
            .filters-sidebar { position: static !important; margin-bottom: 20px; }
        }
    </style>
</body>
</html>
